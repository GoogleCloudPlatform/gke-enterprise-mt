name: Codegen and Dependency Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'pkg/apis/**'
      - 'go.mod'
      - 'go.sum'
      - 'hack/update-codegen.sh'

jobs:
  codegen-tidy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run Codegen
        run: |
          bash hack/update-codegen.sh

      - name: Run Go Mod Tidy
        run: |
          go mod tidy

      - name: Determine Action
        id: determine_action
        run: |
          IS_FORK="${{ github.event.pull_request.head.repo.fork }}"
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          if [ "$IS_FORK" = "false" ] && [[ "$BRANCH_NAME" =~ ^copybara-sync ]]; then
            echo "mode=push" >> $GITHUB_OUTPUT
          else
            echo "mode=verify" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes (Auto-commit Mode)
        if: steps.determine_action.outputs.mode == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate code and tidy modules [skip ci]"

      - name: Verify Changes (Verify Mode)
        if: steps.determine_action.outputs.mode == 'verify'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Detected changes after codegen/tidy. Please run 'hack/update-codegen.sh' and 'go mod tidy' locally and commit changes."
            git status --porcelain
            git diff
            exit 1
          fi
